<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>パグ太郎ゲーム</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/matter-js/0.19.0/matter.min.js"></script>
<style>
  :root{
    --bg:#2a2320; --panel:#3b322c; --cream:#f3e7d3; --tan:#d8a657;
    --accent:#c4564a; --line:#8a6f54;
  }
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  body{
    background:
      radial-gradient(1200px 600px at 50% -10%, #4a3c32 0%, var(--bg) 60%);
    font-family:"Hiragino Kaku Gothic ProN","Yu Gothic",sans-serif;
    color:var(--cream); min-height:100vh;
    display:flex; flex-direction:column; align-items:center;
    overflow:hidden; touch-action:none; user-select:none;
  }
  header{
    width:100%; max-width:480px; display:flex; align-items:flex-end;
    justify-content:space-between; padding:10px 14px 6px;
  }
  h1{
    font-size:17px; letter-spacing:.12em; font-weight:800; color:var(--tan);
    text-shadow:0 2px 0 rgba(0,0,0,.35);
  }
  h1 small{display:block;font-size:10px;color:#bca98c;font-weight:600;letter-spacing:.25em;margin-top:2px}
  .scorebox{text-align:right}
  .scorebox .lbl{font-size:9px;letter-spacing:.3em;color:#bca98c}
  .scorebox .val{font-size:24px;font-weight:800;color:var(--cream);font-variant-numeric:tabular-nums;line-height:1}
  .scorebox .best{font-size:10px;color:#9b8a72;margin-top:2px}
  #wrap{position:relative; touch-action:none;}
  canvas{display:block; border-radius:14px;
    box-shadow:0 12px 40px rgba(0,0,0,.5), inset 0 0 0 1px rgba(255,255,255,.05);}
  #nextbox{
    position:absolute; top:8px; right:8px; width:64px; text-align:center;
    background:rgba(0,0,0,.35); border-radius:10px; padding:5px 4px 6px;
    border:1px solid rgba(255,255,255,.08); pointer-events:none;
  }
  #nextbox .lbl{font-size:8px;letter-spacing:.3em;color:#cdb89a}
  #nextcanvas{margin:2px auto 0; border-radius:0; box-shadow:none}
  #evo{
    width:100%; max-width:480px; display:flex; justify-content:center; gap:2px;
    padding:8px 6px 12px; align-items:center; flex-wrap:nowrap;
  }
  #evo canvas{border-radius:0; box-shadow:none; opacity:.92}
  #evo .arrow{color:#7a6650;font-size:10px}
  #overlay{
    position:absolute; inset:0; border-radius:14px;
    background:rgba(20,14,10,.82); backdrop-filter:blur(3px);
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    gap:14px; opacity:0; pointer-events:none; transition:opacity .4s;
  }
  #overlay.show{opacity:1; pointer-events:auto}
  #overlay h2{font-size:26px;color:var(--tan);letter-spacing:.1em}
  #overlay p{font-size:14px;color:var(--cream)}
  #overlay button{
    font-family:inherit; font-size:15px; font-weight:700; letter-spacing:.1em;
    padding:12px 34px; border:none; border-radius:999px; cursor:pointer;
    background:var(--accent); color:#fff; box-shadow:0 4px 0 #8d3a31;
  }
  #overlay button:active{transform:translateY(3px); box-shadow:0 1px 0 #8d3a31}
  #toast{
    position:absolute; left:50%; top:38%; transform:translate(-50%,-50%);
    font-weight:800; color:#ffe9b0; text-shadow:0 2px 6px rgba(0,0,0,.6);
    font-size:20px; opacity:0; pointer-events:none; white-space:nowrap;
  }
</style>
</head>
<body>
<header>
  <h1>パグ太郎ゲーム<small>PUG TARO</small></h1>
  <div class="scorebox">
    <div class="lbl">SCORE</div>
    <div class="val" id="score">0</div>
    <div class="best" id="best">BEST 0</div>
  </div>
</header>

<div id="wrap">
  <canvas id="game"></canvas>
  <div id="nextbox"><div class="lbl">NEXT</div><canvas id="nextcanvas" width="52" height="52"></canvas></div>
  <div id="toast"></div>
  <div id="overlay">
    <h2>GAME OVER</h2>
    <p id="finalScore"></p>
    <button id="retry">もういちど</button>
  </div>
</div>

<div id="evo"></div>

<script>
"use strict";
/* ============================================================
   パグ図鑑 — 進化チェーン定義
   ============================================================ */
const SPECIES = [
  {key:'puppy',  name:'子犬',     r:21,  score:1},
  {key:'apricot',name:'アプリコット', r:28, score:3},
  {key:'fawn',   name:'フォーン',  r:37,  score:6},
  {key:'black',  name:'黒パグ',   r:48,  score:10},
  {key:'old',    name:'フレブル', r:61,  score:15},
  {key:'king',   name:'パグ王',   r:76,  score:21},
  {key:'devil',  name:'悪魔パグ', r:93,  score:28},
  {key:'angel',  name:'天使パグ', r:112, score:36},
  {key:'god',    name:'黄金パグ神', r:134, score:50},
];
const YUTA = {key:'yuta', name:'ゆうた', r:34, score:0};
const OTOUSAN = {key:'otousan', name:'お父さん', r:40, score:0};
const SPECIAL = {yuta:YUTA, otousan:OTOUSAN};
const YUTA_RATE = 0.07;       // ゆうた出現確率
const OTOUSAN_RATE = 0.06;    // お父さん出現確率
const DROP_MAX_TIER = 4;      // 落とせるのは tier 0..4
const W = 420, H = 620, TOPLINE = 110;

/* ============================================================
   Matter.js セットアップ
   ============================================================ */
const {Engine, Bodies, Composite, Events, Body} = Matter;
const engine = Engine.create({gravity:{x:0, y:1.1}});
const world = engine.world;

const wallOpt = {isStatic:true, friction:.4, restitution:.1};
Composite.add(world, [
  Bodies.rectangle(W/2, H+30, W+120, 60, wallOpt),
  Bodies.rectangle(-30, H/2, 60, H*2, wallOpt),
  Bodies.rectangle(W+30, H/2, 60, H*2, wallOpt),
]);

/* ============================================================
   ゲーム状態
   ============================================================ */
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
let DPR = Math.min(2, window.devicePixelRatio||1);
let viewScale = 1;

function fitCanvas(){
  const maxW = Math.min(window.innerWidth-16, 480);
  const maxH = window.innerHeight - 150;
  viewScale = Math.min(maxW/W, maxH/H);
  canvas.style.width  = (W*viewScale)+'px';
  canvas.style.height = (H*viewScale)+'px';
  canvas.width  = W*viewScale*DPR;
  canvas.height = H*viewScale*DPR;
}
fitCanvas();
addEventListener('resize', fitCanvas);

let score=0, best=0, gameOver=false;
let currentTier = 0, nextTier = 0, currentSpecial=null, nextSpecial=null;
let dropX = W/2, canDrop = true;
let particles = [];
let dangerTimer = 0;

const $score=document.getElementById('score'), $best=document.getElementById('best');
const $overlay=document.getElementById('overlay'), $final=document.getElementById('finalScore');
const $toast=document.getElementById('toast');
let toastT=0;

function showToast(msg){ $toast.textContent=msg; toastT=1; }

function pickNext(){
  const roll=Math.random();
  nextSpecial = roll < OTOUSAN_RATE ? 'otousan'
              : roll < OTOUSAN_RATE+YUTA_RATE ? 'yuta'
              : null;
  nextTier = Math.floor(Math.random()*(DROP_MAX_TIER+1));
}
function advance(){
  currentTier = nextTier; currentSpecial = nextSpecial;
  pickNext();
  if(typeof drawNextPreview!=='undefined') drawNextPreview();
}
pickNext(); advance();

/* ============================================================
   ボディ生成・合体
   ============================================================ */
function makePug(tier, x, y, special=null){
  const sp = special ? SPECIAL[special] : SPECIES[tier];
  const b = Bodies.circle(x, y, sp.r*0.92, {
    restitution:.18, friction:.35, frictionAir:.008, density:.0012,
    label:'pug'
  });
  b.plugin = {tier, special, born:performance.now(), pop:0};
  Composite.add(world, b);
  return b;
}

function spawnParticles(x,y,color,n=14,big=false){
  for(let i=0;i<n;i++){
    const a=Math.random()*Math.PI*2, s=(big?3:2)+Math.random()*3;
    particles.push({x,y,vx:Math.cos(a)*s,vy:Math.sin(a)*s-2,
      life:1, r:(big?5:3)+Math.random()*4, color});
  }
}

let mergeQueue=[];
Events.on(engine,'collisionStart', e=>{
  for(const pair of e.pairs){
    const A=pair.bodyA, B=pair.bodyB;
    if(A.label!=='pug'||B.label!=='pug') continue;
    const pa=A.plugin, pb=B.plugin;
    if(!pa||!pb) continue;
    // 特殊キャラの接触
    if(pa.special || pb.special){
      const sp = pa.special ? A : B;       // 特殊キャラ
      const ot = pa.special ? B : A;       // 相手
      if(sp.plugin.special==='otousan'){
        mergeQueue.push({type:'otousan', A:sp, B:ot});
      }else{
        mergeQueue.push({type:'yuta', A, B});
      }
      continue;
    }
    if(pa.tier===pb.tier && pa.tier<SPECIES.length-1){
      mergeQueue.push({type:'merge',A,B,tier:pa.tier});
    }
  }
});

function processMerges(){
  const removed=new Set();
  for(const m of mergeQueue){
    if(removed.has(m.A.id)||removed.has(m.B.id)) continue;
    const mx=(m.A.position.x+m.B.position.x)/2;
    const my=(m.A.position.y+m.B.position.y)/2;
    if(m.type==='merge'){
      Composite.remove(world,m.A); Composite.remove(world,m.B);
      removed.add(m.A.id); removed.add(m.B.id);
      const nt=m.tier+1;
      const nb=makePug(nt,mx,my);
      nb.plugin.pop=1;
      const pts=SPECIES[nt].score;
      score+=pts;
      spawnParticles(mx,my,'#ffd98a',16,nt>=5);
      if(nt===SPECIES.length-1){ score+=200; showToast('🌟 黄金パグ神 降臨!! +200'); spawnParticles(mx,my,'#ffe06a',40,true); }
    }else if(m.type==='yuta'){
      // ゆうた回収
      const both = m.A.plugin.special==='yuta' && m.B.plugin.special==='yuta';
      Composite.remove(world,m.A); Composite.remove(world,m.B);
      removed.add(m.A.id); removed.add(m.B.id);
      const other = m.A.plugin.special==='yuta'? m.B.plugin : m.A.plugin;
      const bonus = both? 150 : 30+(other.tier+1)*15;
      score+=bonus;
      spawnParticles(mx,my,'#9ad6ff',24,true);
      showToast(both?'ゆうた友情コンボ! +150':'ゆうた「パグかわいい〜」 +'+bonus);
    }else if(m.type==='otousan'){
      // お父さん:パグを1つ前の段階に戻す
      const dad=m.A, ot=m.B;
      if(removed.has(dad.id)||removed.has(ot.id)) continue;
      Composite.remove(world,dad); removed.add(dad.id);
      if(ot.plugin.special){
        // 相手も特殊 → そのまま消える
        Composite.remove(world,ot); removed.add(ot.id);
        spawnParticles(mx,my,'#c8b6ff',14);
      }else{
        const t=ot.plugin.tier;
        Composite.remove(world,ot); removed.add(ot.id);
        const nt=t-1;
        spawnParticles(mx,my,'#c8b6ff',18);
        if(nt>=0){
          const nb=makePug(nt,mx,my); nb.plugin.pop=1;
          showToast('お父さん「まだ早い!」'+SPECIES[nt].name+'に逆戻り');
        }else{
          showToast('お父さん「おかえり」子犬が帰った');
        }
      }
    }
  }
  mergeQueue=[];
  $score.textContent=score;
  if(score>best){best=score;$best.textContent='BEST '+best;}
}

/* ============================================================
   入力
   ============================================================ */
function ptr(e){
  const rect=canvas.getBoundingClientRect();
  const cx=(e.touches?e.touches[0].clientX:e.clientX)-rect.left;
  return cx/viewScale;
}
function clampX(x,r){ return Math.max(r+6, Math.min(W-r-6, x)); }

canvas.addEventListener('pointermove', e=>{ if(!gameOver) dropX=ptr(e); });
canvas.addEventListener('pointerdown', e=>{ if(!gameOver) dropX=ptr(e); });
canvas.addEventListener('pointerup', e=>{
  if(gameOver||!canDrop) return;
  const sp=currentSpecial?SPECIAL[currentSpecial]:SPECIES[currentTier];
  const x=clampX(ptr(e), sp.r);
  makePug(currentTier, x, 60, currentSpecial);
  canDrop=false;
  setTimeout(()=>{advance(); canDrop=true;}, 520);
});

document.getElementById('retry').addEventListener('click', ()=>{
  for(const b of Composite.allBodies(world)) if(b.label==='pug') Composite.remove(world,b);
  score=0; $score.textContent='0'; gameOver=false; dangerTimer=0;
  $overlay.classList.remove('show'); pickNext(); advance(); canDrop=true;
});

/* ============================================================
   ゲームオーバー判定
   ============================================================ */
function checkGameOver(dt){
  let danger=false;
  const now=performance.now();
  for(const b of Composite.allBodies(world)){
    if(b.label!=='pug') continue;
    if(now-b.plugin.born<1600) continue;
    if(b.position.y - b.circleRadius < TOPLINE && Math.abs(b.velocity.y)<.3){ danger=true; break; }
  }
  dangerTimer = danger? dangerTimer+dt : 0;
  if(dangerTimer>1.4 && !gameOver){
    gameOver=true;
    $final.textContent='SCORE '+score;
    $overlay.classList.add('show');
  }
}
</script>
<script>
"use strict";
/* ============================================================
   描画 — リアル寄りパグフェイス(凹凸シルエット)
   各タイプの設定
   ============================================================ */
const PALETTE = {
  puppy:  {filter:'saturate(1.06) brightness(1.05)', coat:'#ecd4ad', coat2:'#d3b384', mask:'#2a2018', ear:'#2a2018', eye:'#3a261a', tongue:true, eyeMask:true, thumb:true, pupScale:1.1},
  apricot:{filter:'saturate(1.5) hue-rotate(-10deg) brightness(1.02)', coat:'#e0bb84', coat2:'#c39a5c', mask:'#1d1510', ear:'#1d1510', eye:'#2e1d10', eyeMask:true, thumb:true},
  fawn:   {filter:'none', coat:'#e3c9a0', coat2:'#cda874', mask:'#1a1209', ear:'#1a1209', eye:'#3a2412', eyeMask:true, thumb:true},
  black:  {filter:'grayscale(1) brightness(0.46) contrast(1.45)', coat:'#34302e', coat2:'#1c1917', mask:'#141110', ear:'#141110', eye:'#100b08', sheen:true},
  old:    {filter:'brightness(1.08) saturate(0.92)', coat:'#cfc6ba', coat2:'#a89e90', mask:'#8f857a', ear:'#7b7166', eye:'#4a4038', oldface:true},
  king:   {filter:'saturate(1.12) brightness(1.05)', coat:'#e3c9a0', coat2:'#cda874', mask:'#1a1209', ear:'#1a1209', eye:'#3a2412', eyeMask:true, thumb:true, crown:true},
  devil:  {filter:'sepia(1) saturate(6) hue-rotate(-34deg) brightness(0.82) contrast(1.1)', coat:'#7e3030', coat2:'#511c1c', mask:'#2a1010', ear:'#2a1010', eye:'#e8b400', eyeMask:true, horns:true, evil:true},
  angel:  {filter:'brightness(1.22) saturate(0.82) contrast(0.95)', coat:'#f2ead9', coat2:'#d4c6ab', mask:'#8d7a5e', ear:'#8d7a5e', eye:'#4f3b26', eyeMask:true, halo:true, wings:true},
  god:    {filter:'sepia(1) saturate(2.5) hue-rotate(-8deg) brightness(1.12)', coat:'#e9c25a', coat2:'#c2922f', mask:'#8a5e16', ear:'#8a5e16', eye:'#5b3c08', halo:true, rays:true, crown:false, sheen:true},
};

/* 凹凸のあるパグ輪郭(単位100基準)。耳・頬・あご肉が外に張り出す */
function pugSilhouette(c){
  c.beginPath();
  c.moveTo(0,-84);
  c.bezierCurveTo(34,-90, 58,-86, 72,-72);
  c.bezierCurveTo(92,-54, 99,-22, 96,8);
  c.bezierCurveTo(94,40, 84,64, 60,80);
  c.bezierCurveTo(40,92, 18,95, 0,95);
  c.bezierCurveTo(-18,95, -40,92, -60,80);
  c.bezierCurveTo(-84,64, -94,40, -96,8);
  c.bezierCurveTo(-99,-22, -92,-54, -72,-72);
  c.bezierCurveTo(-58,-86, -34,-90, 0,-84);
  c.closePath();
}

function drawWrinkle(c, x1,y1, cx,cy, x2,y2, w, col){
  c.strokeStyle=col; c.lineWidth=w; c.lineCap='round';
  c.beginPath(); c.moveTo(x1,y1); c.quadraticCurveTo(cx,cy,x2,y2); c.stroke();
}

/* 各パグのちょいアレンジ(写真の上に重ねる) 目≈±45,-16 鼻≈0,16 舌≈0,53 */
function drawArrange(c, key){
  c.lineCap='round'; c.lineJoin='round';
  switch(key){
    case 'puppy': {
      // 頭のぴょこっと毛束
      c.strokeStyle='#caa877'; c.lineWidth=4;
      c.beginPath(); c.moveTo(-6,-86); c.quadraticCurveTo(-12,-104,2,-100); c.stroke();
      c.beginPath(); c.moveTo(2,-86); c.quadraticCurveTo(10,-104,12,-94); c.stroke();
      // ぷっくりチーク
      c.fillStyle='rgba(244,120,120,.30)';
      c.beginPath(); c.ellipse(-58,28,12,8,0,0,7); c.fill();
      c.beginPath(); c.ellipse(58,28,12,8,0,0,7); c.fill();
      break;
    }
    case 'apricot': {
      // 耳元の小さな花
      c.save(); c.translate(-58,-58);
      c.fillStyle='#ff9ec4';
      for(let i=0;i<5;i++){ c.beginPath(); c.ellipse(Math.cos(i/5*6.28)*7,Math.sin(i/5*6.28)*7,5,5,0,0,7); c.fill(); }
      c.fillStyle='#ffd34d'; c.beginPath(); c.arc(0,0,4,0,7); c.fill();
      c.restore();
      break;
    }
    case 'fawn': {
      // ほっぺのハート
      c.fillStyle='rgba(214,90,110,.5)';
      c.save(); c.translate(58,30); c.scale(1,1);
      c.beginPath();
      c.moveTo(0,3); c.bezierCurveTo(-6,-5,-12,2,0,11);
      c.bezierCurveTo(12,2,6,-5,0,3); c.fill();
      c.restore();
      break;
    }
    case 'black': {
      // 黒パグを読みやすく:リムライト+目の輝き+鼻の艶
      c.strokeStyle='rgba(150,180,230,.5)'; c.lineWidth=5; c.lineCap='round';
      c.beginPath(); c.moveTo(-70,-30); c.quadraticCurveTo(0,-96,70,-30); c.stroke();
      c.strokeStyle='rgba(150,180,230,.3)'; c.lineWidth=4;
      c.beginPath(); c.moveTo(-86,10); c.quadraticCurveTo(-92,46,-66,72); c.stroke();
      c.beginPath(); c.moveTo(86,10); c.quadraticCurveTo(92,46,66,72); c.stroke();
      // 目のキャッチライト(白)で顔を認識しやすく
      c.fillStyle='rgba(255,255,255,.95)';
      c.beginPath(); c.arc(-49,-20,4.5,0,7); c.fill();
      c.beginPath(); c.arc(40,-20,4.5,0,7); c.fill();
      c.fillStyle='rgba(255,255,255,.5)';
      c.beginPath(); c.arc(-41,-12,2.4,0,7); c.fill();
      c.beginPath(); c.arc(48,-12,2.4,0,7); c.fill();
      // 鼻の艶
      c.fillStyle='rgba(160,180,220,.4)';
      c.beginPath(); c.ellipse(-4,8,6,3,0,0,7); c.fill();
      break;
    }
    case 'old': break; // フレブルは専用画像をそのまま使用
    case 'king': {
      // 王のマント(赤+白ファー縁+斑点)
      c.fillStyle='#9d2128';
      c.beginPath();
      c.moveTo(-72,58); c.quadraticCurveTo(-118,96,-70,124);
      c.quadraticCurveTo(0,112,70,124); c.quadraticCurveTo(118,96,72,58);
      c.quadraticCurveTo(0,92,-72,58); c.closePath(); c.fill();
      c.fillStyle='#f4efe6';
      c.beginPath();
      c.moveTo(-72,58); c.quadraticCurveTo(0,92,72,58);
      c.quadraticCurveTo(40,74,0,78); c.quadraticCurveTo(-40,74,-72,58); c.closePath(); c.fill();
      c.fillStyle='#2a2420';
      [[-30,68],[0,72],[30,68]].forEach(([gx,gy])=>{c.beginPath();c.ellipse(gx,gy,2.4,3.4,0,0,7);c.fill();});
      // 金の襟+宝石
      c.strokeStyle='#d6a93b'; c.lineWidth=6;
      c.beginPath(); c.moveTo(-44,84); c.quadraticCurveTo(0,98,44,84); c.stroke();
      const gems=['#c4564a','#3e8f5a','#3e6fae'];
      [-26,0,26].forEach((gx,i)=>{c.fillStyle=gems[i];c.beginPath();c.arc(gx,90+(gx===0?3:0),5,0,7);c.fill();
        c.fillStyle='rgba(255,255,255,.6)';c.beginPath();c.arc(gx-1.5,88+(gx===0?3:0),1.6,0,7);c.fill();});
      break;
    }
    case 'devil': {
      // 怒り眉
      c.strokeStyle='#2a0606'; c.lineWidth=5; c.lineCap='round';
      c.beginPath(); c.moveTo(-62,-36); c.lineTo(-30,-26); c.stroke();
      c.beginPath(); c.moveTo(62,-36); c.lineTo(30,-26); c.stroke();
      // 光る赤い目
      c.fillStyle='rgba(255,70,40,.5)';
      c.beginPath(); c.arc(-45,-16,16,0,7); c.fill();
      c.beginPath(); c.arc(43,-16,16,0,7); c.fill();
      c.fillStyle='rgba(255,180,80,.95)';
      c.beginPath(); c.arc(-45,-16,5,0,7); c.fill();
      c.beginPath(); c.arc(43,-16,5,0,7); c.fill();
      // 牙
      c.fillStyle='#fff';
      c.beginPath(); c.moveTo(-14,58); c.lineTo(-6,58); c.lineTo(-10,70); c.closePath(); c.fill();
      c.beginPath(); c.moveTo(14,58); c.lineTo(6,58); c.lineTo(10,70); c.closePath(); c.fill();
      // ヤギひげ
      c.fillStyle='#3a0d0d';
      c.beginPath(); c.moveTo(-9,84); c.lineTo(9,84); c.lineTo(0,104); c.closePath(); c.fill();
      // 三叉の尾(右下から覗く)
      c.strokeStyle='#7e1f1f'; c.lineWidth=5; c.lineCap='round';
      c.beginPath(); c.moveTo(70,96); c.quadraticCurveTo(110,90,108,58); c.stroke();
      c.fillStyle='#7e1f1f';
      c.beginPath(); c.moveTo(108,58); c.lineTo(100,48); c.lineTo(112,50);
      c.lineTo(116,40); c.lineTo(118,54); c.lineTo(108,58); c.closePath(); c.fill();
      // 小さな炎(下両端)
      c.fillStyle='rgba(255,140,40,.8)';
      for(const fx of [-80,80]){ c.beginPath();
        c.moveTo(fx,96); c.quadraticCurveTo(fx-6,78,fx,70);
        c.quadraticCurveTo(fx+6,82,fx,96); c.fill(); }
      break;
    }
    case 'angel': {
      // ほっぺ
      c.fillStyle='rgba(255,150,160,.35)';
      c.beginPath(); c.ellipse(-58,28,11,8,0,0,7); c.fill();
      c.beginPath(); c.ellipse(58,28,11,8,0,0,7); c.fill();
      // きらめき
      c.fillStyle='rgba(255,255,255,.95)';
      star(c,56,-44,6,2.2,4); star(c,-54,-50,5,1.8,4); star(c,72,30,4,1.5,4); star(c,-70,24,4,1.5,4);
      break;
    }
    case 'god': {
      c.fillStyle='rgba(255,240,160,.95)';
      star(c,-66,-30,7,2.8,5); star(c,68,-20,6,2.4,5); star(c,44,72,5,2,5); star(c,-48,74,5,2,5);
      break;
    }
  }
}
function star(c,x,y,R,r,n){
  c.beginPath();
  for(let i=0;i<n*2;i++){ const ang=i*Math.PI/n - Math.PI/2; const rad=i%2?r:R;
    const px=x+Math.cos(ang)*rad, py=y+Math.sin(ang)*rad;
    i?c.lineTo(px,py):c.moveTo(px,py); }
  c.closePath(); c.fill();
}

function drawPug(c, P, key){
  // ===== 写真の顔をフィルター付きで描画 =====
  const faceImg = (key==='old') ? frebImg : pugImg;
  if(faceImg && faceImg.complete && faceImg.naturalWidth){
    c.save();
    c.filter = (key==='old') ? 'none' : (P.filter || 'none');
    c.drawImage(faceImg, -106, -108, 212, 212);
    c.restore();

  // ===== 各パグのアレンジ =====
  if(key) drawArrange(c, key);

  // ===== 装飾 =====
  if(P.crown){

    c.fillStyle='#f4efe6'; c.strokeStyle='#cfc6b6'; c.lineWidth=2;
    c.beginPath(); c.ellipse(0,8,46,10,0,0,7); c.fill(); c.stroke();

    c.fillStyle='#f0c33c'; c.strokeStyle='#9a7414'; c.lineWidth=3; c.lineJoin='round';

    c.moveTo(-46,6); c.lineTo(-50,-34); c.lineTo(-26,-12);
    c.lineTo(0,-46); c.lineTo(26,-12); c.lineTo(50,-34); c.lineTo(46,6);
    c.closePath(); c.fill(); c.stroke();
    // 先端の宝玉
    c.fillStyle='#c4564a';
    [[-50,-34],[0,-46],[50,-34]].forEach(([x,y])=>{c.beginPath();c.arc(x,y,5,0,7);c.fill();});
    // 中央の大宝石
    c.fillStyle='#c4564a'; c.beginPath(); c.arc(0,-8,8,0,7); c.fill();
    c.fillStyle='rgba(255,255,255,.6)'; c.beginPath(); c.arc(-2,-10,2.6,0,7); c.fill();
    c.fillStyle='#3e6fae';
    c.beginPath(); c.arc(-26,-4,4,0,7); c.fill();
    c.beginPath(); c.arc(26,-4,4,0,7); c.fill();
    c.fillStyle='#3e8f5a';
    c.beginPath(); c.arc(-13,0,3,0,7); c.fill();
    c.beginPath(); c.arc(13,0,3,0,7); c.fill();
    c.restore();
  }
  if(P.horns){
    c.fillStyle='#42171a'; c.strokeStyle='#1c0808'; c.lineWidth=3; c.lineJoin='round';
    for(const s of [-1,1]){
      c.beginPath();
      c.moveTo(s*30,-72);
      c.quadraticCurveTo(s*62,-96, s*58,-138);
      c.quadraticCurveTo(s*48,-112, s*18,-82);
      c.closePath(); c.fill(); c.stroke();
      // 角のリッジ
      c.strokeStyle='rgba(255,180,150,.3)'; c.lineWidth=2;
      c.beginPath(); c.moveTo(s*34,-80); c.quadraticCurveTo(s*52,-104,s*52,-130); c.stroke();
      c.strokeStyle='#1c0808'; c.lineWidth=3;
    }
  }
  if(P.halo){
    c.save(); c.translate(0,-112);
    c.strokeStyle='rgba(255,222,90,.95)'; c.lineWidth=7;
    c.shadowColor='rgba(255,220,90,.8)'; c.shadowBlur=12;
    c.beginPath(); c.ellipse(0,0,34,11,0,0,7); c.stroke();
    c.restore();
  }
}

}

const SPRITES = {};
function buildSprite(key, radius){
  const pad = 1.6;                       // 翼・後光・冠のはみ出し分
  const size = Math.ceil(radius*2*pad*DPR);
  const cv = document.createElement('canvas');
  cv.width=cv.height=size;
  const c = cv.getContext('2d');
  c.translate(size/2,size/2);
  c.scale(radius*DPR/100, radius*DPR/100);
  if(key==='yuta'){ drawYuta(c); }
  else if(key==='otousan'){ drawOtousan(c); }
  else{
    const P=PALETTE[key];
    drawBehind(c,P);
    drawPug(c,P,key);
  }
  SPRITES[key]={cv, pad};
}
function buildAllSprites(){
  SPECIES.forEach(s=>buildSprite(s.key, s.r));
  buildSprite('yuta', YUTA.r);
  buildSprite('otousan', OTOUSAN.r);
  drawNextPreview();
  buildEvoChart();
}
let _imgWait = 2;
function _imgReady(){ if(--_imgWait<=0) buildAllSprites(); }
[pugImg, frebImg].forEach(im=>{
  if(im.complete && im.naturalWidth) _imgReady();
  else { im.onload=_imgReady; im.onerror=_imgReady; }
});

function drawSprite(c, key, x, y, r, angle, popScale){
  const s=SPRITES[key];
  if(!s) return;
  const d=r*2*s.pad*(popScale||1);
  c.save(); c.translate(x,y); c.rotate(angle);
  c.drawImage(s.cv, -d/2, -d/2, d, d);
  c.restore();
}

/* NEXT プレビュー */
const nctx=document.getElementById('nextcanvas').getContext('2d');
function drawNextPreview(){
  nctx.clearRect(0,0,52,52);
  const key=nextSpecial?SPECIAL[nextSpecial].key:SPECIES[nextTier].key;
  const s=SPRITES[key];
  if(!s) return;
  nctx.drawImage(s.cv,2,2,48,48);
}

/* 進化チャート */
function buildEvoChart(){
  const evo=document.getElementById('evo');
  evo.innerHTML='';
  SPECIES.forEach((s,i)=>{
    const cv=document.createElement('canvas');
    const px=Math.round(20+i*2.4);
    cv.width=cv.height=px*2; cv.style.width=cv.style.height=px+'px';
    const c=cv.getContext('2d');
    if(SPRITES[s.key]) c.drawImage(SPRITES[s.key].cv,0,0,px*2,px*2);
    cv.title=s.name;
    evo.appendChild(cv);
    if(i<SPECIES.length-1){
      const a=document.createElement('span');
      a.className='arrow'; a.textContent='▸';
      evo.appendChild(a);
    }
  });
}

/* ============================================================
   メインループ
   ============================================================ */
let lastT=performance.now();
function loop(now){
  const dt=Math.min(.05,(now-lastT)/1000); lastT=now;
  Engine.update(engine, 1000/60);
  processMerges();
  if(!gameOver) checkGameOver(dt);

  ctx.setTransform(viewScale*DPR,0,0,viewScale*DPR,0,0);
  // 背景
  const bg=ctx.createLinearGradient(0,0,0,H);
  bg.addColorStop(0,'#efe2c8'); bg.addColorStop(1,'#d9c39a');
  ctx.fillStyle=bg; ctx.fillRect(0,0,W,H);
  // 壁の内側陰影
  ctx.fillStyle='rgba(120,90,55,.12)';
  ctx.fillRect(0,0,8,H); ctx.fillRect(W-8,0,8,H); ctx.fillRect(0,H-8,W,8);
  // デッドライン
  ctx.strokeStyle = dangerTimer>0 ? 'rgba(196,70,58,.85)' : 'rgba(140,110,70,.5)';
  ctx.lineWidth=2.5; ctx.setLineDash([10,8]);
  ctx.beginPath(); ctx.moveTo(0,TOPLINE); ctx.lineTo(W,TOPLINE); ctx.stroke();
  ctx.setLineDash([]);

  // 落下予告(ガイド+持ちキャラ)
  if(!gameOver && canDrop){
    const sp=currentSpecial?SPECIAL[currentSpecial]:SPECIES[currentTier];
    const gx=clampX(dropX, sp.r);
    ctx.strokeStyle='rgba(120,90,55,.30)'; ctx.lineWidth=2; ctx.setLineDash([4,7]);
    ctx.beginPath(); ctx.moveTo(gx,60+sp.r); ctx.lineTo(gx,H-10); ctx.stroke();
    ctx.setLineDash([]);
    drawSprite(ctx, sp.key, gx, 60, sp.r, 0, 1);
  }

  // ボディ描画
  for(const b of Composite.allBodies(world)){
    if(b.label!=='pug') continue;
    const p=b.plugin;
    if(p.pop>0){ p.pop=Math.max(0,p.pop-dt*4); }
    const pop=1+Math.sin((1-p.pop)*Math.PI)*.18*(p.pop>0?1:0);
    const key=p.special||SPECIES[p.tier].key;
    const r=p.special?SPECIAL[p.special].r:SPECIES[p.tier].r;
    drawSprite(ctx, key, b.position.x, b.position.y, r, b.angle, pop);
  }

  // パーティクル
  for(let i=particles.length-1;i>=0;i--){
    const pt=particles[i];
    pt.x+=pt.vx; pt.y+=pt.vy; pt.vy+=.15; pt.life-=dt*1.6;
    if(pt.life<=0){ particles.splice(i,1); continue; }
    ctx.globalAlpha=pt.life;
    ctx.fillStyle=pt.color;
    ctx.beginPath(); ctx.arc(pt.x,pt.y,pt.r*pt.life,0,7); ctx.fill();
    ctx.globalAlpha=1;
  }

  // トースト
  if(toastT>0){
    toastT=Math.max(0,toastT-dt*.7);
    $toast.style.opacity=Math.min(1,toastT*3);
    $toast.style.transform=`translate(-50%,${-50-(1-toastT)*30}%)`;
  }

  requestAnimationFrame(loop);
}
requestAnimationFrame(loop);
</script>
