<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>パグぷよ</title>
<style>
  :root{
    --bg:#fdfbf7;--panel:#ffffff;--line:#e6ddcf;--ink:#5a4a3a;
    --pink:#e8a0a8;--pink-d:#cd838c;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;margin:0;}
  html,body{height:100%;}
  body{
    background:linear-gradient(180deg,#fdfbf7 0%,#f6efe4 100%);
    color:var(--ink);
    font-family:"Hiragino Maru Gothic ProN","Hiragino Sans",system-ui,sans-serif;
    height:100dvh;overflow:hidden;user-select:none;
    display:flex;flex-direction:column;align-items:center;
    padding:calc(env(safe-area-inset-top) + 6px) 8px calc(env(safe-area-inset-bottom) + 6px);
    gap:6px;
  }
  /* top bar: title + stats in one compact row */
  .topbar{
    width:100%;max-width:520px;display:flex;align-items:center;justify-content:space-between;gap:8px;
    flex:0 0 auto;
  }
  .title{display:flex;flex-direction:column;line-height:1;}
  .title h1{font-size:20px;font-weight:800;color:#6b5742;letter-spacing:1px;}
  .title h1 .pug{color:var(--pink-d);}
  .title .sub{font-size:10px;color:#a8967f;margin-top:2px;}
  .stats{display:flex;gap:6px;align-items:center;}
  .chip{background:var(--panel);border:2px solid var(--line);border-radius:10px;
        padding:4px 8px;text-align:center;min-width:54px;box-shadow:0 2px 6px #c9bba418;}
  .chip .lbl{font-size:9px;color:#a8967f;letter-spacing:.5px;}
  .chip .val{font-size:18px;font-weight:800;color:#6b5742;line-height:1.1;}
  .chip.next{padding:3px 6px;}
  #next{display:block;}
  /* board area fills remaining height */
  .stage{flex:1 1 auto;min-height:0;display:flex;align-items:center;justify-content:center;width:100%;}
  #board{
    background:var(--panel);border:3px solid var(--line);border-radius:12px;
    box-shadow:0 8px 24px #c9bba422,inset 0 0 0 2px #00000008;
    touch-action:none;display:block;
  }
  /* controls pinned at bottom, compact */
  .controls{flex:0 0 auto;display:flex;align-items:center;justify-content:center;gap:18px;width:100%;max-width:520px;}
  .pad{display:grid;grid-template-columns:repeat(3,auto);gap:6px;}
  .pad button,.act button{
    width:50px;height:46px;background:#fff;color:#6b5742;border:3px solid var(--line);
    border-radius:12px;font-size:20px;font-weight:800;box-shadow:0 4px 0 #e0d6c5;cursor:pointer;
    transition:transform .05s,box-shadow .05s;}
  .pad button:active,.act button:active{transform:translateY(3px);box-shadow:0 1px 0 #e0d6c5;}
  .pad .empty{visibility:hidden;}
  .act button{width:auto;height:46px;padding:0 18px;font-size:15px;}
  .hint{display:none;}
  /* desktop: show keyboard hint, hide touch pad, keep one column */
  @media (min-width:760px) and (min-height:560px){
    body{justify-content:center;gap:10px;}
    .controls{display:none;}
    .hint{display:block;flex:0 0 auto;font-size:12px;color:#b3a48f;text-align:center;}
  }
  #overlay{position:fixed;inset:0;background:#fdfbf7e6;display:flex;flex-direction:column;align-items:center;
           justify-content:center;gap:14px;z-index:10;backdrop-filter:blur(3px);padding:20px;text-align:center;}
  #overlay.hidden{display:none;}
  #overlay h2{font-size:30px;color:var(--pink-d);}
  #overlay .big{background:var(--pink);color:#fff;border:none;padding:14px 36px;border-radius:30px;
                font-size:20px;font-weight:800;box-shadow:0 6px 0 var(--pink-d);cursor:pointer;}
  #overlay .big:active{transform:translateY(3px);box-shadow:0 3px 0 var(--pink-d);}
  #overlay .score{font-size:18px;color:#6b5742;}
</style>
</head>
<body>
  <div class="topbar">
    <div class="title">
      <h1><span class="pug">パグ</span>ぷよ</h1>
      <div class="sub">同じパグを4匹つなげて消そう 🐶</div>
    </div>
    <div class="stats">
      <div class="chip next"><div class="lbl">NEXT</div><canvas id="next" width="34" height="62"></canvas></div>
      <div class="chip"><div class="lbl">SCORE</div><div class="val" id="score">0</div></div>
      <div class="chip"><div class="lbl">CHAIN</div><div class="val" id="chain">0</div></div>
    </div>
  </div>

  <div class="stage"><canvas id="board"></canvas></div>

  <div class="controls">
    <div class="pad">
      <span class="empty"></span><button id="bUp">&#10227;</button><span class="empty"></span>
      <button id="bLeft">&#9664;</button><button id="bDown">&#9660;</button><button id="bRight">&#9654;</button>
    </div>
    <div class="act"><button id="bDrop">落下</button></div>
  </div>
  <div class="hint">&larr;&rarr;移動 / &darr;落下 / &uarr;&middot;Z 回転 / Space 一気落とし</div>

  <div id="overlay">
    <h2 id="ovTitle">パグぷよ</h2>
    <div class="score" id="ovScore"></div>
    <button class="big" id="startBtn">スタート</button>
  </div>

const KINDS = PUG_IMG.length;
const COLS=6, ROWS=12;

const board=document.getElementById('board'), ctx=board.getContext('2d');
const nextCanvas=document.getElementById('next'), nctx=nextCanvas.getContext('2d');
const scoreEl=document.getElementById('score'), chainEl=document.getElementById('chain');
const overlay=document.getElementById('overlay'), ovTitle=document.getElementById('ovTitle');
const ovScore=document.getElementById('ovScore'), startBtn=document.getElementById('startBtn');
const stage=document.querySelector('.stage');

let CELL=40;
function fitSize(){
  // available area = the .stage box (already accounts for topbar/controls via flexbox)
  const rect=stage.getBoundingClientRect();
  const availW=rect.width-6, availH=rect.height-6;
  CELL=Math.max(20,Math.floor(Math.min(availW/COLS, availH/ROWS)));
  board.width=CELL*COLS; board.height=CELL*ROWS;
  // scale NEXT preview cell
  NEXT_CELL=Math.floor(nextCanvas.width);
}
let NEXT_CELL=34;
window.addEventListener('resize',()=>{fitSize();draw();drawNext();});

let grid,score,chainCount,current,nextPair,dropTimer,dropInterval,running,busy;
function emptyGrid(){return Array.from({length:ROWS},()=>Array(COLS).fill(-1));}
function randKind(){return Math.floor(Math.random()*KINDS);}
function newPair(){return {c:2,r:0,a:randKind(),b:randKind(),rot:0};}
function satOffset(rot){return [[0,-1],[1,0],[0,1],[-1,0]][rot];}

function reset(){
  grid=emptyGrid(); score=0; chainCount=0; dropInterval=720; busy=false; running=true;
  current=newPair(); nextPair=newPair(); fitSize(); updateHud(); draw(); drawNext();
}
function updateHud(){scoreEl.textContent=score;chainEl.textContent=chainCount;}

function cellFree(c,r){ if(c<0||c>=COLS||r>=ROWS) return false; if(r<0) return true; return grid[r][c]===-1; }
function pairCells(p){const [dc,dr]=satOffset(p.rot); return [{c:p.c,r:p.r,k:p.a},{c:p.c+dc,r:p.r+dr,k:p.b}];}
function pairFits(p){return pairCells(p).every(c=>cellFree(c.c,c.r));}
function tryMove(dc){const np={...current,c:current.c+dc}; if(pairFits(np)){current=np;draw();}}
function tryRotate(dir){
  let nr=(current.rot+dir+4)%4, np={...current,rot:nr};
  if(pairFits(np)){current=np;draw();return;}
  for(const dc of [-1,1]){let k={...np,c:np.c+dc}; if(pairFits(k)){current=k;draw();return;}}
  let up={...np,r:np.r-1}; if(pairFits(up)){current=up;draw();}
}
function softDrop(){const np={...current,r:current.r+1}; if(pairFits(np)){current=np;draw();} else lockPair();}
function hardDrop(){while(true){const np={...current,r:current.r+1}; if(pairFits(np)) current=np; else break;} draw(); lockPair();}

function lockPair(){
  if(busy) return;
  for(const cell of pairCells(current))
    if(cell.r>=0&&cell.r<ROWS&&cell.c>=0&&cell.c<COLS) grid[cell.r][cell.c]=cell.k;
  current=null; busy=true; resolveBoard();
}
function resolveBoard(){
  let chain=0;
  function step(){
    applyGravity(); draw();
    const groups=findClears();
    if(groups.length===0){
      chainCount=chain; updateHud(); busy=false;
      if(grid[1][2]!==-1||grid[0][2]!==-1){gameOver();return;}
      spawnNext(); return;
    }
    chain++; let cleared=0;
    for(const g of groups){for(const [r,c] of g){grid[r][c]=-1;} cleared+=g.length;}
    const chainPower=[0,8,16,32,64,96,128,160][Math.min(chain,7)]||200;
    const groupBonus=groups.length>=2?groups.length*3:0;
    score+=Math.floor(cleared*10*Math.max(1,chainPower/8)+groupBonus*10);
    chainCount=chain; updateHud(); draw();
    setTimeout(step,260);
  }
  setTimeout(step,120);
}
function applyGravity(){
  for(let c=0;c<COLS;c++){let w=ROWS-1;
    for(let r=ROWS-1;r>=0;r--){ if(grid[r][c]!==-1){const v=grid[r][c]; grid[r][c]=-1; grid[w][c]=v; w--;}}}
}
function findClears(){
  const seen=Array.from({length:ROWS},()=>Array(COLS).fill(false)); const groups=[];
  for(let r=0;r<ROWS;r++)for(let c=0;c<COLS;c++){
    if(grid[r][c]===-1||seen[r][c]) continue;
    const k=grid[r][c]; const stack=[[r,c]]; const cells=[]; seen[r][c]=true;
    while(stack.length){const [cr,cc]=stack.pop(); cells.push([cr,cc]);
      for(const [dr,dc] of [[1,0],[-1,0],[0,1],[0,-1]]){const nr=cr+dr,nc=cc+dc;
        if(nr<0||nr>=ROWS||nc<0||nc>=COLS) continue;
        if(!seen[nr][nc]&&grid[nr][nc]===k){seen[nr][nc]=true;stack.push([nr,nc]);}}}
    if(cells.length>=4) groups.push(cells);
  }
  return groups;
}
function spawnNext(){ current=nextPair; nextPair=newPair(); if(!pairFits(current)){gameOver();return;} drawNext(); draw(); }
function gameOver(){
  running=false; busy=false;
  ovTitle.textContent='ゲームオーバー'; ovScore.textContent='スコア '+score;
  startBtn.textContent='もう一回'; overlay.classList.remove('hidden');
}

function drawPug(g,x,y,size,k){
  const img=PUG_IMG[k];
  if(img.complete && img.naturalWidth){ g.drawImage(img,x+size*0.02,y+size*0.02,size*0.96,size*0.96); }
  else{ g.fillStyle='#ddd'; g.beginPath(); g.arc(x+size/2,y+size/2,size*0.4,0,7); g.fill(); }
}
function draw(){
  ctx.clearRect(0,0,board.width,board.height);
  ctx.strokeStyle='#00000008';
  for(let c=1;c<COLS;c++){ctx.beginPath();ctx.moveTo(c*CELL,0);ctx.lineTo(c*CELL,board.height);ctx.stroke();}
  for(let r=1;r<ROWS;r++){ctx.beginPath();ctx.moveTo(0,r*CELL);ctx.lineTo(board.width,r*CELL);ctx.stroke();}
  for(let r=0;r<ROWS;r++)for(let c=0;c<COLS;c++) if(grid[r][c]!==-1) drawPug(ctx,c*CELL,r*CELL,CELL,grid[r][c]);
  if(current) for(const cell of pairCells(current)) if(cell.r>=0) drawPug(ctx,cell.c*CELL,cell.r*CELL,CELL,cell.k);
}
function drawNext(){
  if(!nextPair) return;
  nctx.clearRect(0,0,nextCanvas.width,nextCanvas.height);
  const s=nextCanvas.width;
  drawPug(nctx,0,0,s,nextPair.b); drawPug(nctx,0,s,s,nextPair.a);
}

let lastTime=0;
function loop(t){
  if(running&&!busy&&current){dropTimer+=t-lastTime; if(dropTimer>=dropInterval){dropTimer=0;softDrop();}}
  lastTime=t; requestAnimationFrame(loop);
}
dropTimer=0; requestAnimationFrame(loop);

function onKey(e){
  if(!running||busy||!current) return;
  switch(e.key){
    case 'ArrowLeft':tryMove(-1);e.preventDefault();break;
    case 'ArrowRight':tryMove(1);e.preventDefault();break;
    case 'ArrowDown':softDrop();dropTimer=0;e.preventDefault();break;
    case 'ArrowUp':case 'x':case 'X':tryRotate(1);e.preventDefault();break;
    case 'z':case 'Z':tryRotate(-1);e.preventDefault();break;
    case ' ':hardDrop();e.preventDefault();break;
  }
}
window.addEventListener('keydown',onKey);
function bind(id,fn){
  const el=document.getElementById(id);
  const h=ev=>{ev.preventDefault(); if(running&&!busy&&current)fn();};
  el.addEventListener('click',h);
}
bind('bLeft',()=>tryMove(-1)); bind('bRight',()=>tryMove(1));
bind('bDown',()=>{softDrop();dropTimer=0;}); bind('bUp',()=>tryRotate(1)); bind('bDrop',()=>hardDrop());
startBtn.addEventListener('click',()=>{overlay.classList.add('hidden'); reset(); dropTimer=0;});

// initial sizing so board isn't 0 before first game
window.addEventListener('load',()=>{ grid=emptyGrid(); fitSize(); draw(); });
fitSize();
</script>
</body>
</html>
